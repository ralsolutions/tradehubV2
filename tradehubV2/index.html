<script>
// Auto-migration: kept for legacy data
(function(){
try{
var raw=localStorage.getItem('ral-data-v5');
if(!raw)return;
var d=JSON.parse(raw);
if(!d||!d.categories||!d.channels)return;
var ch=false;

if(d.categories.length > 0 && d.categories[0].order === undefined){
  d.categories.forEach(function(c, i){ c.order = i; });
  ch=true;
}

if(!d.categories.find(function(c){return c.id==='cat-timesheets'})){
d.categories.splice(2,0,{id:'cat-timesheets',name:'Timesheets',emoji:'⏱️',system:'timesheets',collapsed:false,order:2});
ch=true;}
if(!d.channels.find(function(c){return c.id==='ts-overview'})){
d.channels.push({id:'ts-overview',type:'ts-overview',name:'worked-hours',categoryId:'cat-timesheets',createdAt:new Date().toISOString()});
ch=true;}
if(!d.channels.find(function(c){return c.id==='crew-roster'})){
d.channels.push({id:'crew-roster',type:'roster',name:'👷crew-roster',categoryId:'cat-crew',createdAt:new Date().toISOString()});
ch=true;}

// v6 migration: fix roster emoji if it was missing
var roster=d.channels.find(function(c){return c.id==='crew-roster'});
if(roster && !roster.name.match(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u)){
  roster.name='👷crew-roster';
  ch=true;
}

// v6 migration: fix tool emojis
var paintCh=d.channels.find(function(c){return c.id==='mat-paint'});
if(paintCh && paintCh.name !== '🎨paint'){ paintCh.name='🎨paint'; ch=true; }
var netCh=d.channels.find(function(c){return c.id==='mat-netting'});
if(netCh && netCh.name !== '🥅netting'){ netCh.name='🥅netting'; ch=true; }
var sealCh=d.channels.find(function(c){return c.id==='mat-sealant'});
if(sealCh && sealCh.name !== '🔫sealant'){ sealCh.name='🔫sealant'; ch=true; }

var cal=d.channels.find(function(c){return c.id==='crew-calendar'});
if(cal){
  cal.name = '📅work-calendar';
  ch=true;
}

var g=d.channels.find(function(c){return (c.id==='crew-general' || c.name==='anuncios') && c.categoryId==='cat-crew'});
if(g){
  g.name='📢announcements';
  g.whatsappLink='https://chat.whatsapp.com/ral-crew-announcements-demo';
  if(g.id==='crew-general') g.id='crew-announcements';
  ch=true;
}

var crewChannels = d.channels.filter(function(c){return c.categoryId==='cat-crew';});
if(crewChannels.length){
  var order = ['📢announcements','📅work-calendar','👷crew-roster'];
  crewChannels.sort(function(a,b){
    var aIdx = order.findIndex(function(n){return a.name.includes(n) || n.includes(a.name);});
    var bIdx = order.findIndex(function(n){return b.name.includes(n) || n.includes(b.name);});
    if(aIdx===-1) aIdx=999; if(bIdx===-1) bIdx=999;
    return aIdx - bIdx;
  });
  var otherChannels = d.channels.filter(function(c){return c.categoryId!=='cat-crew';});
  d.channels = otherChannels.concat(crewChannels);
  ch=true;
}

if(ch)localStorage.setItem('ral-data-v5',JSON.stringify(d));
}catch(e){console.warn('Migration error:',e);}
})();
</script>

function useStorage(key, init) {
const [val, setVal] = useState(() => {
try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; }
});
useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
return [val, setVal];
}
function useTheme() {
const [theme, setTheme] = useState(() => { try { return localStorage.getItem('ral-theme') || 'light'; } catch { return 'light'; } });
useEffect(() => { document.documentElement.setAttribute('data-theme', theme); try { localStorage.setItem('ral-theme', theme); } catch {} }, [theme]);
return [theme, setTheme];
}
function useIsMobile() {
const [m, setM] = useState(() => typeof window !== 'undefined' && window.matchMedia('(max-width: 760px)').matches);
useEffect(() => {
  const mq = window.matchMedia('(max-width: 760px)');
  const h = () => setM(mq.matches);
  mq.addEventListener ? mq.addEventListener('change', h) : mq.addListener(h);
  return () => { mq.removeEventListener ? mq.removeEventListener('change', h) : mq.removeListener(h); };
}, []);
return m;
}
function formatDate(iso) { if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric'}); }
function formatShortDate(iso) { if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ', {day:'numeric',month:'short'}); }
function formatTime(iso) { if(!iso) return ''; return new Date(iso).toLocaleString('en-NZ', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
// Local YYYY-MM-DD (NOT toISOString, which converts to UTC and shifts the day
// backwards in +UTC timezones like NZ — that was the calendar off-by-one bug).
function localISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayISO(){ return localISO(new Date()); }
function addDays(iso, n) { const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate() + n); return localISO(d); }
function daysBetween(a, b) { const d1 = new Date(a+'T00:00:00'); const d2 = new Date(b+'T00:00:00'); return Math.round((d2-d1)/(1000*60*60*24)); }
function datesFor(start, days) { const arr = []; for(let i = 0; i < days; i++) arr.push(addDays(start, i)); return arr; }
function calcHours(start, end) { if(!start || !end) return 0; const [sh,sm] = start.split(':').map(Number); const [eh,em] = end.split(':').map(Number); let mins = (eh*60+em) - (sh*60+sm); if(mins < 0) mins += 24*60; return Math.round(mins/60*100)/100; }
function monthsAgo(n) { const d = new Date(); d.setMonth(d.getMonth() - n); return localISO(d); }
function encodeObj(p) { try { const json = JSON.stringify(p); const b64 = btoa(unescape(encodeURIComponent(json))); return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); } catch { return ''; } }
function decodeObj(str) { try { let b64 = str.replace(/-/g,'+').replace(/_/g,'/'); while(b64.length % 4) b64 += '='; const json = decodeURIComponent(escape(atob(b64))); return JSON.parse(json); } catch { return null; } }
function buildShareUrl(channel) { const base = window.location.origin + window.location.pathname; return `${base}#p=${encodeObj(channel)}`; }
function buildWhatsAppMessage(ch) {
const lines = [`📋 *${ch.name}*`, ''];
INFO_FIELDS.forEach(f => { const val = ch[f.key]; if(val) lines.push(`${f.emoji} *${f.label}:* ${val}`); });
if(ch.clientMobile) lines.push(`📱 *Client mobile:* ${ch.clientMobile}`);
if(ch.startDate) lines.push(`📅 *Start date:* ${formatDate(ch.startDate)}`);
lines.push(''); lines.push('🔗 *Project info:* ' + buildShareUrl(ch));
if(ch.surveyLink) lines.push('🔍 *Quick Survey:* ' + ch.surveyLink);
return lines.join('\n');
}
function buildRamsUrl(project) {
// Build a URL for the RAMS form with the project fields pre-filled via query params.
// The RAMS form at rams-beta.vercel.app needs to read these params and pre-fill.
const params = new URLSearchParams();
if(project.name) params.set('projectName', project.name);
if(project.address) params.set('location', project.address);
if(project.teamLeader) params.set('teamLeader', project.teamLeader);
if(project.startDate) params.set('date', new Date(project.startDate+'T00:00:00').toLocaleDateString('en-NZ'));
if(project.clientName) params.set('client1Name', project.clientName);
if(project.clientMobile) params.set('client1Mobile', project.clientMobile);
// Also pass a project reference so RAMS can tag it if it wants
params.set('projectRef', project.id);
return RAMS_URL + '?' + params.toString();
}
function slugify(name){ return name.toLowerCase().replace(/[^\w]+/g,'-').replace(/^-|-$/g,''); }
function renderWithMentions(text, channels, onMentionClick) {
if(!text) return null;
const parts = text.split(/(#[\w-]+)/g);
return parts.map((part, i) => {
if(part.startsWith('#')) {
const slug = part.slice(1).toLowerCase();
const ch = channels.find(c => slugify(c.name) === slug);
if(ch) return <a key={i} className="mention" onClick={(e) => { e.preventDefault(); onMentionClick(ch.id); }}>{part}</a>;
}
return part;
});
}
function pickProjectColor(allProjects) {
const usedByRunning = new Set(allProjects.filter(p => p.status !== 'done' && p.colorId).map(p => p.colorId));
const available = PROJECT_COLORS.find(c => !usedByRunning.has(c.id));
if(available) return available.id;
return PROJECT_COLORS[0].id;
}
function getColor(colorId) { return PROJECT_COLORS.find(c => c.id === colorId) || PROJECT_COLORS[0]; }

function useMentions(text, setText, allChannels, currentChannelId, filterToToolsOnly = false) {
const [open, setOpen] = useState(false); const [query, setQuery] = useState(''); const [pos, setPos] = useState(0); const [activeIdx, setActiveIdx] = useState(0);
const matches = useMemo(() => {
if(!open) return []; const q = query.toLowerCase(); let filtered = allChannels.filter(c => c.id !== currentChannelId);
if(filterToToolsOnly) { filtered = filtered.filter(c => c.categoryId === 'cat-tools'); }
return filtered.filter(c => slugify(c.name).includes(q) || c.name.toLowerCase().includes(q)).slice(0,8);
}, [open, query, allChannels, currentChannelId, filterToToolsOnly]);
useEffect(() => { setActiveIdx(0); }, [query]);
const handleChange = (e) => { const v = e.target.value; setText(v); const cursor = e.target.selectionStart; const before = v.slice(0, cursor); const m = before.match(/#([\w-]*)$/); if(m) { setOpen(true); setQuery(m[1]); setPos(cursor - m[0].length); } else { setOpen(false); } };
const insert = (channel, ref) => { const slug = slugify(channel.name); const before = text.slice(0, pos); const after = text.slice(pos + 1 + query.length); const newText = before + '#' + slug + ' ' + after; setText(newText); setOpen(false); setTimeout(() => { if(ref?.current) { const nc = (before + '#' + slug + ' ').length; ref.current.focus(); ref.current.setSelectionRange(nc, nc); } }, 0); };
const handleKeyDown = (e, ref) => { if(!open || matches.length === 0) return false; if(e.key === 'ArrowDown'){ e.preventDefault(); setActiveIdx(i => (i+1) % matches.length); return true; } if(e.key === 'ArrowUp'){ e.preventDefault(); setActiveIdx(i => (i-1+matches.length) % matches.length); return true; } if(e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); insert(matches[activeIdx], ref); return true; } if(e.key === 'Escape'){ e.preventDefault(); setOpen(false); return true; } return false; };
return {open, matches, activeIdx, setActiveIdx, insert, handleChange, handleKeyDown, close:()=>setOpen(false)};
}

function MentionDropdown({mentions, inputRef, getCategory, dropUp=true}) {
if(!mentions.open || mentions.matches.length === 0) return null;
const pos = dropUp ? {bottom:'100%', marginBottom:6} : {top:'100%', marginTop:6};
return (
<div style={{...s.mentionDrop, ...pos, left:0}}>
{mentions.matches.map((c, i) => { const cat = getCategory(c.categoryId); const isActive = i === mentions.activeIdx; const hash = c.type === 'job' ? '◆' : c.type === 'materials' ? '' : '#';
return (<div key={c.id} style={{...s.mentionItem, ...(isActive ? s.mentionItemActive : {})}} onMouseEnter={() => mentions.setActiveIdx(i)} onClick={() => mentions.insert(c, inputRef)}><span style={s.mentionItemHash}>{hash}</span><span>{c.name}</span><span style={s.mentionItemMeta}>{cat?.name || ''}</span></div>); })}
</div>
);

function IncidentFormModal({onClose, onSave, project, editing, currentUser, calendarEntries, company}) {
const [data, setData] = useState(editing || {date:todayISO(), type:'near-miss', technicians:project.teamLeader||'', whatHappened:'', howToAvoid:''});
const set = k => e => setData(p => ({...p, [k]: e.target.value}));
const techSuggestions = useMemo(() => {
  const {sameDay, allProject} = getSuggestedTechniciansForDate(project.id, data.date, calendarEntries || []);
  const companyUserNames = (company?.users || []).map(u => u.name);
  const allUnique = new Set([...sameDay, ...allProject]);
  return {sameDay, allProject:[...allUnique], company:companyUserNames.filter(n=>!allUnique.has(n))};
}, [project.id, data.date, calendarEntries, company]);
// Parse current technicians as array
const techList = (data.technicians || '').split(',').map(t=>t.trim()).filter(Boolean);
const [showAddOther, setShowAddOther] = useState(false);
const [otherName, setOtherName] = useState('');
const toggleTech = (name) => {
  const next = techList.includes(name) ? techList.filter(n=>n!==name) : [...techList, name];
  setData(p => ({...p, technicians: next.join(', ')}));
};
const addOther = () => {
  if (!otherName.trim()) return;
  const next = [...techList, otherName.trim()];
  setData(p => ({...p, technicians: next.join(', ')}));
  setOtherName(''); setShowAddOther(false);
};

const save = () => {
  if(!data.whatHappened.trim()) return alert('Describe what happened.');
  const userName = currentUser?.name || '—';
  if (editing) {
    const fields = ['date','type','technicians','whatHappened','howToAvoid'];
    const next = {date:data.date, type:data.type, technicians:data.technicians, whatHappened:data.whatHappened, howToAvoid:data.howToAvoid};
    const textHist = diffSimpleFields(editing, next, fields, userName);
    const fieldHistory = mergeFieldHistory(editing.fieldHistory, textHist);
    const changes = fields.filter(f => (editing[f]||'') !== (next[f]||''));
    let editHistory = editing.editHistory || [];
    if (changes.length > 0) {
      editHistory = [...editHistory, {editedAt:new Date().toISOString(), editedBy:userName, fields:changes}];
    }
    onSave({...editing, ...next, fieldHistory, editHistory});
  } else {
    onSave({
      id: 'inc-'+Date.now().toString(36),
      projectId: project.id,
      projectName: project.name,
      projectAddress: project.address,
      createdAt: new Date().toISOString(),
      createdBy: userName,
      fieldHistory: {},
      editHistory: [],
      ...data,
    });
  }
  onClose();
};
const chip = (label, selected, onClick) => (

);

return (<div style={s.overlay} onClick={onClose}>
  <div style={s.modal} onClick={e=>e.stopPropagation()}>
    <div style={s.modalHeader}>
      <div>
        <div style={s.modalKicker}>{editing ? 'Edit' : 'New'} · Incident report</div>

      </div>

    </div>

      <label style={s.label}>Type</label>
      <div style={s.incidentTypePicker}>{INCIDENT_TYPES.map(t => { const active = data.type === t.id; return (<div key={t.id} style={{...s.incidentTypeBtn, ...(active ? {...s.incidentTypeBtnActive, borderColor:t.color, background:t.bg} : {})}} onClick={()=>setData(p=>({...p, type:t.id}))}><div style={s.incidentTypeEmoji}>{t.emoji}</div><div style={{...s.incidentTypeLabel, color:active ? t.color : 'var(--text)'}}>{t.label}</div></div>); })}</div>
      <div style={s.row2}>
        <div><label style={s.label}>Date</label><input style={s.input} type="date" value={data.date} onChange={set('date')}/></div>
        <div><label style={s.label}>Job</label><input style={{...s.input, opacity:0.6, cursor:'not-allowed'}} value={editing?.projectName || project.name} disabled/></div>
      </div>
      <label style={s.label}>Technicians involved</label>
      <div style={{padding:'10px',background:'var(--bg-sunken)',borderRadius:7,border:'1px solid var(--border)',marginBottom:10}}>
        {techSuggestions.sameDay.length > 0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--success)',textTransform:'uppercase',marginBottom:4}}>📅 Scheduled today</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{techSuggestions.sameDay.map(n => chip(n, techList.includes(n), () => toggleTech(n)))}</div>
          </div>
        )}
        {techSuggestions.allProject.filter(n=>!techSuggestions.sameDay.includes(n)).length > 0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:4}}>👥 Project crew</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{techSuggestions.allProject.filter(n=>!techSuggestions.sameDay.includes(n)).map(n => chip(n, techList.includes(n), () => toggleTech(n)))}</div>
          </div>

        {techSuggestions.company.length > 0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:4}}>🏢 Other company users</div>

    <div style={s.modalFooter}>
      <button style={s.cancelBtn} onClick={onClose}>Cancel</button>
      <button style={s.primaryBtn} onClick={save}>{editing ? 'Save changes' : 'Submit report'}</button>
    </div>
  </div>
</div>);
}

function TimesheetEntryModal({onClose, onSave, crew, projectId, projectName, editing, timesheets, onAddCrew, currentUser, company, calendarEntries}) {
const isCrew = currentUser?.role === 'crew';
const companyUserNames = (company?.users || []).map(u => u.name);
// Smart workers list: project crew (from calendar) + history of timesheet entries on this project + company users
const projectWorkers = useMemo(() => {
  const calendarTechs = getProjectTechniciansFromCalendar(projectId, calendarEntries || []);
  const tsHistoryNames = new Set((timesheets||[]).filter(t=>t.projectId===projectId).map(t=>t.workerName));
  const all = new Set([...calendarTechs, ...tsHistoryNames, ...companyUserNames]);
  crew.forEach(c => all.add(c.name));
  return [...all].sort();
}, [timesheets, projectId, crew, companyUserNames, calendarEntries]);

const lastEntryFor = (name) => {
  if (!name) return null;
  const all = (timesheets||[]).filter(t => t.workerName === name);
  if (all.length === 0) return null;
  const sameProject = all.filter(t => t.projectId === projectId).sort((a,b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime));
  if (sameProject.length > 0) return sameProject[0];
  return all.sort((a,b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime))[0];
};
const initialWorker = editing?.workerName || (isCrew ? currentUser.name : '');
const initialLast = !editing ? lastEntryFor(initialWorker) : null;
const [workerName, setWorkerName] = useState(initialWorker);
const [date, setDate] = useState(editing?.date || todayISO());
const [startTime, setStartTime] = useState(editing?.startTime || initialLast?.startTime || '07:00');
const [endTime, setEndTime] = useState(editing?.endTime || initialLast?.endTime || '15:30');
const [description, setDescription] = useState(editing?.description || '');
const [editComment, setEditComment] = useState('');
// "Other" / outsider option for worker dropdown
const [showAddOther, setShowAddOther] = useState(false);
const [otherName, setOtherName] = useState('');

const onWorkerChange = (e) => {
  const name = e.target.value;
  if (name === '__other__') { setShowAddOther(true); return; }
  setWorkerName(name);
  if (!editing && name) {
    const last = lastEntryFor(name);
    if (last) {
      setStartTime(last.startTime);
      setEndTime(last.endTime);
    }
  }
};
const addOther = () => {
  if (!otherName.trim()) return;
  setWorkerName(otherName.trim());
  setOtherName(''); setShowAddOther(false);
};

const hours = calcHours(startTime, endTime);
const MIN_DESC = 5;
const descOk = description.trim().length >= MIN_DESC;

// Detect if hours/times were changed when editing
const timesChanged = editing && (editing.startTime !== startTime || editing.endTime !== endTime || editing.date !== date);
const COMMENT_MIN = 10;
const commentOk = !timesChanged || editComment.trim().length >= COMMENT_MIN;

const save = () => {
  if(!workerName) return alert('Select a worker.');
  if(!descOk) return alert(`Description must be at least ${MIN_DESC} characters.`);
  if(timesChanged && !commentOk) return alert(`Justification required (min ${COMMENT_MIN} characters) for time changes.`);

  const userName = currentUser?.name || '—';
  const newEntry = {
    id: editing?.id || 'ts-'+Date.now().toString(36),
    projectId, projectName, workerName, date, startTime, endTime, hours,
    description: description.trim(),
    status: editing?.status || 'pending',
    createdAt: editing?.createdAt || new Date().toISOString(),
    createdBy: editing?.createdBy || userName,
    editHistory: editing?.editHistory || [],
    fieldHistory: editing?.fieldHistory || {},
  };

  if (editing) {
    const fields = ['workerName','date','startTime','endTime','description'];
    const next = {workerName, date, startTime, endTime, description: description.trim()};
    const textHist = diffSimpleFields(editing, next, fields, userName);
    newEntry.fieldHistory = mergeFieldHistory(editing.fieldHistory, textHist);
    const changes = fields.filter(f => (editing[f]||'') !== (next[f]||''));
    if (changes.length > 0) {
      const auditEntry = {editedAt:new Date().toISOString(), editedBy:userName, fields:changes};
      if (timesChanged && editComment.trim()) auditEntry.justification = editComment.trim();
      newEntry.editHistory = [...newEntry.editHistory, auditEntry];
    }
  }

  onSave(newEntry);
  onClose();
};

return (<div style={s.overlay} onClick={onClose}>
  <div style={s.modal} onClick={e=>e.stopPropagation()}>
    <div style={s.modalHeader}>
      <div>
        <div style={s.modalKicker}>{editing?'Edit':'New'} · Timesheet entry</div>
        <div style={s.modalTitle}>{projectName}</div>
      </div>
      <button style={s.closeBtn} onClick={onClose}>×</button>
    </div>
    <div style={s.modalBody}>
      <label style={s.label}>Worker *</label>
      {isCrew
        ? <input style={{...s.input,opacity:0.7,cursor:'not-allowed'}} value={workerName} disabled/>
        : (
          <>
            <select style={s.input} value={projectWorkers.includes(workerName)?workerName:(workerName?'':'')} onChange={onWorkerChange}>
              <option value="">— Select worker —</option>
              {projectWorkers.map(n => <option key={n} value={n}>{n}</option>)}
              <option value="__other__">+ Other / outsider…</option>
            </select>
            {workerName && !projectWorkers.includes(workerName) && (
              <div style={{padding:'6px 10px',background:'var(--accent-bg)',border:'1px solid var(--accent)',borderRadius:5,fontSize:11,color:'var(--accent-text)',marginTop:-10,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>👤 Outsider: <b>{workerName}</b></span>
                <button type="button" onClick={()=>setWorkerName('')} style={{background:'none',border:'none',color:'var(--accent-text)',cursor:'pointer',fontSize:14,padding:0}}>×</button>
              </div>
            )}
            {showAddOther && (
              <div style={{padding:'10px',background:'var(--bg-raised)',borderRadius:7,border:'1px solid var(--accent)',marginTop:-10,marginBottom:14,display:'flex',gap:8,alignItems:'end'}}>
                <div style={{flex:1}}><label style={{...s.label,marginBottom:4}}>Outsider name</label><input style={{...s.input,marginBottom:0}} value={otherName} onChange={e=>setOtherName(e.target.value)} placeholder="e.g. John (subcontractor)" autoFocus/></div>
                <button type="button" onClick={addOther} style={{...s.primaryBtn,padding:'8px 14px'}}>Add</button>
                <button type="button" onClick={()=>{setShowAddOther(false);setOtherName('');}} style={{...s.cancelBtn,padding:'8px 14px'}}>✕</button>
              </div>
            )}
          </>
        )
      }
      <label style={s.label}>Date *</label>
      <input style={s.input} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
      <div style={s.row2}>
        <div>
          <label style={s.label}>Start time *</label>
          <input style={s.input} type="time" step="900" value={startTime} onChange={e=>setStartTime(e.target.value)}/>
        </div>
        <div>
          <label style={s.label}>End time *</label>
          <input style={s.input} type="time" step="900" value={endTime} onChange={e=>setEndTime(e.target.value)}/>
        </div>
      </div>
      <div style={{fontSize:13,color:'var(--accent-text)',fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginTop:-8,marginBottom:16}}>= {hours} hours</div>
      <label style={s.label}>Description * <span style={{fontWeight:400,textTransform:'none'}}>({description.trim().length}/{MIN_DESC} min chars)</span></label>
      <textarea style={{...s.textarea, borderColor: description.trim().length > 0 && !descOk ? 'var(--warn)' : undefined}} value={description} onChange={e=>setDescription(e.target.value)} rows={3} placeholder={`Brief description (min ${MIN_DESC} chars)...`}/>
      {timesChanged && (
        <div style={{padding:'12px 14px',background:'var(--warn-bg)',border:'1px solid var(--warn)',borderRadius:7,marginTop:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--warn)',fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',letterSpacing:0.2,marginBottom:8}}>⚠ Time/date changed — justification required</div>
          <textarea style={{...s.textarea,marginBottom:0,borderColor:!commentOk?'var(--warn)':undefined}} value={editComment} onChange={e=>setEditComment(e.target.value)} rows={2} placeholder={`Why are the hours different? (min ${COMMENT_MIN} chars)`}/>
          <div style={{fontSize:11,color:'var(--text-dim)',marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>{editComment.trim().length}/{COMMENT_MIN} min chars</div>
        </div>
      )}
    </div>
    <div style={s.modalFooter}>
      <button style={s.cancelBtn} onClick={onClose}>Cancel</button>
      <button style={{...s.primaryBtn, opacity:(workerName&&descOk&&commentOk)?1:0.5}} onClick={save}>{editing?'Save':'Add entry'}</button>
    </div>
  </div>
</div>);
}

function CalendarBookingModal({onClose, onSave, jobChannels, allChannels, getCategory, editing, defaultDate, company}) {
const [projectId, setProjectId] = useState(editing?.projectId || jobChannels[0]?.id || '');
const [startDate, setStartDate] = useState(editing?.startDate || defaultDate || todayISO());
const [days, setDays] = useState(editing?.days || 1);
const [comment, setComment] = useState(editing?.comment || '');

// Initialize selected technicians from existing string (split by comma)
const [selectedTechs, setSelectedTechs] = useState(() => {
  if (editing?.technicians) {
    return editing.technicians.split(',').map(t => t.trim()).filter(Boolean);
  }
  return [];
});
// Initialize selected tools from existing #mentions or comma-separated names
const [selectedTools, setSelectedTools] = useState(() => {
  if (editing?.tools) {
    const matches = editing.tools.match(/#[\w-]+/g);
    if (matches) return matches.map(m => m.slice(1));
    return editing.tools.split(',').map(t => t.trim()).filter(Boolean);
  }
  return [];
});

const availableTechs = useMemo(() => (company?.users || []).map(u => u.name), [company]);
const availableTools = useMemo(() => allChannels.filter(c => c.categoryId === 'cat-tools' && c.type === 'materials'), [allChannels]);

const toggleTech = (name) => setSelectedTechs(prev => prev.includes(name) ? prev.filter(t => t !== name) : [...prev, name]);
const toggleTool = (slug) => setSelectedTools(prev => prev.includes(slug) ? prev.filter(t => t !== slug) : [...prev, slug]);

const commentRef = useRef(null);
const commentMentions = useMentions(comment, setComment, allChannels, null, false);
const endDate = useMemo(() => addDays(startDate, Math.max(0, (parseInt(String(days),10)||1)-1)), [startDate, days]);

const save = () => {
  const project = jobChannels.find(c => c.id === projectId);
  if(!project) return alert('Pick a project.');
  const d = parseInt(String(days), 10);
  if(!d || d < 1) return alert('Days must be at least 1.');
  const technicians = selectedTechs.join(', ');
  const tools = selectedTools.map(s => '#' + s).join(' ');
  onSave({
    id: editing?.id || 'cal-'+Date.now().toString(36),
    projectId, projectName: project.name, colorId: project.colorId,
    startDate, days: d, dates: datesFor(startDate, d),
    technicians, tools, comment,
    createdAt: editing?.createdAt || new Date().toISOString()
  });
  onClose();
};

const chip = (label, selected, onClick) => (
  <button type="button" onClick={onClick} style={{
    padding:'6px 12px',borderRadius:16,fontSize:12,fontWeight:600,cursor:'pointer',
    background: selected ? 'var(--accent)' : 'var(--bg-raised)',
    color: selected ? '#fff' : 'var(--text-muted)',
    border: '1px solid ' + (selected ? 'var(--accent)' : 'var(--border)'),
    transition:'all 0.12s'
  }}>{selected ? '✓ ' : ''}{label}</button>
);

return (<div style={s.overlay} onClick={onClose}>
  <div style={s.modal} onClick={e=>e.stopPropagation()}>
    <div style={s.modalHeader}>
      <div>
        <div style={s.modalKicker}>{editing ? 'Edit' : 'New'} · Schedule entry</div>
        <div style={s.modalTitle}>{editing ? 'Edit booking' : 'Schedule a job'}</div>
      </div>
      <button style={s.closeBtn} onClick={onClose}>×</button>
    </div>
    <div style={s.modalBody}>
      <label style={s.label}>Project *</label>
      <select style={s.input} value={projectId} onChange={e=>setProjectId(e.target.value)}>
        {jobChannels.length === 0 && <option value="">— No projects available —</option>}
        {jobChannels.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
      <div style={s.row2}>
        <div>
          <label style={s.label}>Start date *</label>
          <input style={s.input} type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
        </div>
        <div>
          <label style={s.label}>Working days *</label>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <button type="button" onClick={()=>setDays(d=>Math.max(1,d-1))} style={{width:34,height:34,borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-raised)',color:'var(--text)',fontSize:16,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
            <input
              style={{...s.input,marginBottom:0,textAlign:'center',fontWeight:700,fontSize:15,flex:1,minWidth:0}}
              type="text"
              inputMode="numeric"
              value={days}
              onChange={e => {
                const raw = e.target.value.replace(/[^0-9]/g,'');
                if (raw === '') { setDays(''); return; }
                const n = parseInt(raw, 10);
                if (!isNaN(n)) setDays(Math.min(60, Math.max(1, n)));
              }}
              onBlur={e => {
                const n = parseInt(String(days), 10);
                setDays(isNaN(n) || n < 1 ? 1 : Math.min(60, n));
              }}
            />
            <button type="button" onClick={()=>setDays(d=>Math.min(60,Number(d||0)+1))} style={{width:34,height:34,borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-raised)',color:'var(--text)',fontSize:16,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
          </div>
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--text-dim)',marginTop:-10,marginBottom:16,fontFamily:"'JetBrains Mono',monospace"}}>
        {days > 1 ? `${formatShortDate(startDate)} → ${formatShortDate(endDate)} · ${days} days` : `${formatShortDate(startDate)} · 1 day`}
      </div>
      <label style={s.label}>Technicians involved {selectedTechs.length > 0 && <span style={{fontWeight:400,textTransform:'none',color:'var(--accent-text)'}}>({selectedTechs.length} selected)</span>}</label>
      {availableTechs.length === 0
        ? <div style={{padding:'10px 12px',background:'var(--warn-bg)',border:'1px solid var(--warn)',borderRadius:6,fontSize:12,color:'var(--warn)',marginBottom:16}}>No team members yet. Add users in Settings → Users.</div>
        : <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16,padding:'10px',background:'var(--bg-sunken)',borderRadius:7,border:'1px solid var(--border)'}}>
            {availableTechs.map(name => chip(name, selectedTechs.includes(name), () => toggleTech(name)))}
          </div>
      }
      <label style={s.label}>Tools / materials needed {selectedTools.length > 0 && <span style={{fontWeight:400,textTransform:'none',color:'var(--accent-text)'}}>({selectedTools.length} selected)</span>}</label>
      {availableTools.length === 0
        ? <div style={{padding:'10px 12px',background:'var(--bg-raised)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,color:'var(--text-dim)',marginBottom:16}}>No tools yet. Add material channels in Tools & Materials.</div>
        : <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16,padding:'10px',background:'var(--bg-sunken)',borderRadius:7,border:'1px solid var(--border)'}}>
            {availableTools.map(t => { const slug = slugify(t.name); return chip(t.name, selectedTools.includes(slug), () => toggleTool(slug)); })}
          </div>
      }
      <label style={s.label}>Comment</label>
      <div style={s.noteInputWrap}>
        <MentionDropdown mentions={commentMentions} inputRef={commentRef} getCategory={getCategory} dropUp={true}/>
        <textarea ref={commentRef} style={s.textarea} value={comment} onChange={(e)=>commentMentions.handleChange(e)} onKeyDown={(e)=>commentMentions.handleKeyDown(e, commentRef)} placeholder="Scope of work, access notes, client requests..." rows={4}/>
      </div>
    </div>
    <div style={s.modalFooter}>
      <button style={s.cancelBtn} onClick={onClose}>Cancel</button>
      <button style={s.primaryBtn} onClick={save}>{editing ? 'Save' : 'Add booking'}</button>
    </div>
  </div>
</div>);
}

function InfoDisplay({channel, onSetChat, canEdit}) {
const handleSetChat = () => { if(!onSetChat) return; const link = prompt('Add your chat group link (WhatsApp, Telegram, Discord, etc.):', channel.whatsapp || ''); if(link === null) return; onSetChat(link.trim()); };
const [openHist, setOpenHist] = useState({}); // {fieldKey: true} = show older versions for that field
const toggleHist = (key) => setOpenHist(p => ({...p, [key]: !p[key]}));
const anchorStatus = useMemo(() => {
  if (channel.anchorInspectionConfirmed === false || !channel.anchorInspectionDue) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(channel.anchorInspectionDue+'T00:00:00');
  const diffDays = Math.round((due-now)/(1000*60*60*24));
  const monthsLeft = Math.round(diffDays / 30.44);
  if (diffDays < 0) {
    const overdueM = Math.abs(monthsLeft);
    return {label: overdueM >= 1 ? `overdue · ${overdueM} month${overdueM===1?'':'s'}` : `overdue by ${-diffDays} day${-diffDays===1?'':'s'}`, color:'var(--danger)', bg:'var(--danger-bg)'};
  }
  if (diffDays === 0) return {label:'due today', color:'var(--warn)', bg:'var(--warn-bg)'};
  if (diffDays <= 14) return {label:`in ${diffDays} day${diffDays===1?'':'s'}`, color:'var(--warn)', bg:'var(--warn-bg)'};
  if (monthsLeft <= 2) return {label:`in ${monthsLeft} month${monthsLeft===1?'':'s'}`, color:'var(--warn)', bg:'var(--warn-bg)'};
  if (monthsLeft <= 6) return {label:`${monthsLeft} months left`, color:'var(--accent-text)', bg:'var(--accent-bg)'};
  if (monthsLeft <= 12) return {label:`${monthsLeft} months left`, color:'var(--success)', bg:'var(--success-bg)'};
  return {label:`needs to be recertified`, color:'var(--warn)', bg:'var(--warn-bg)'};
}, [channel.anchorInspectionDue, channel.anchorInspectionConfirmed]);

const fh = channel.fieldHistory || {};
const renderFieldLine = (f, val) => {
  const hist = fh[f.key] || [];
  if (hist.length === 0) {
    return (
      <div key={f.key} style={s.infoLine}>
        <span style={s.infoEmoji}>{f.emoji}</span>
        <div style={{flex:1}}>
          <span style={s.infoLabelBold}>{f.label}:</span>
          {val ? <span style={s.infoValText}>{val}</span> : <span style={s.infoEmpty}>—</span>}
          {f.key === 'clientName' && channel.clientMobile && (<span style={s.infoValText}> · 📱 {channel.clientMobile}</span>)}
        </div>
      </div>
    );
  }
  // Edited field: show the CURRENT value clean, with a clickable "✎ N" chip.
  // Older (struck-through) versions stay hidden until the chip is clicked.
  const isOpen = !!openHist[f.key];
  return (
    <div key={f.key} style={{...s.infoLine,flexDirection:'column',alignItems:'flex-start',gap:2}}>
      <div style={{display:'flex',gap:10,alignItems:'baseline',width:'100%',flexWrap:'wrap'}}>
        <span style={s.infoEmoji}>{f.emoji}</span>
        <span style={s.infoLabelBold}>{f.label}:</span>
        {val ? <span style={s.infoValText}>{val}</span> : <span style={s.infoEmpty}>—</span>}
        {f.key === 'clientName' && channel.clientMobile && (<span style={s.infoValText}> · 📱 {channel.clientMobile}</span>)}
        <button onClick={()=>toggleHist(f.key)} title={isOpen?'Hide previous versions':'Show previous versions'} style={{marginLeft:'auto',fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--warn)',background:'var(--warn-bg)',padding:'2px 6px',borderRadius:3,border:'1px solid var(--warn)',textTransform:'uppercase',letterSpacing:0.2,cursor:'pointer'}}>{isOpen?'▾':'✎'} {hist.length} edit{hist.length===1?'':'s'}</button>
      </div>
      {isOpen && (
        <div style={{paddingLeft:34,width:'100%',fontSize:12,lineHeight:1.55,marginTop:4,borderLeft:'2px solid var(--border)',marginLeft:6}}>
          {hist.map((h, i) => (
            <div key={i} style={{textDecoration:'line-through',color:'var(--text-faint)',paddingLeft:8}}>
              {h.value || <em>(empty)</em>}
              <span style={{textDecoration:'none',marginLeft:8,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)'}}>· {h.editedBy} · {formatTime(h.editedAt)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

return (<div style={s.infoList}>
  {INFO_FIELDS.map(f => renderFieldLine(f, channel[f.key]))}
  {(channel.startDate || (fh.startDate||[]).length>0) && renderFieldLine({key:'startDate', emoji:'📅', label:'Start date'}, channel.startDate ? formatDate(channel.startDate) : '')}
  <div style={s.infoLine}>
    <span style={s.infoEmoji}>⚓</span>
    <div style={{flex:1,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
      <span style={s.infoLabelBold}>Anchor inspection due:</span>
      {channel.anchorInspectionConfirmed === false
        ? <span style={{fontSize:11,color:'var(--text-dim)',fontStyle:'italic'}}>not confirmed yet</span>
        : channel.anchorInspectionDue
          ? (<><span style={s.infoValText}>{formatDate(channel.anchorInspectionDue)}</span>{anchorStatus && <span style={{fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',letterSpacing:0.2,padding:'3px 8px',borderRadius:5,color:anchorStatus.color,background:anchorStatus.bg,border:'1px solid '+anchorStatus.color}}>{anchorStatus.label}</span>}</>)
          : <span style={s.infoEmpty}>—</span>
      }
      {(fh.anchorInspectionDue||[]).length > 0 && <button onClick={()=>toggleHist('anchorInspectionDue')} title={openHist.anchorInspectionDue?'Hide previous versions':'Show previous versions'} style={{fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--warn)',background:'var(--warn-bg)',padding:'2px 6px',borderRadius:3,border:'1px solid var(--warn)',textTransform:'uppercase',letterSpacing:0.2,cursor:'pointer'}}>{openHist.anchorInspectionDue?'▾':'✎'} {fh.anchorInspectionDue.length} edit{fh.anchorInspectionDue.length===1?'':'s'}</button>}
    </div>
  </div>
  {(fh.anchorInspectionDue||[]).length > 0 && openHist.anchorInspectionDue && (
    <div style={{paddingLeft:34,fontSize:12,lineHeight:1.55,marginTop:-2,marginBottom:8,borderLeft:'2px solid var(--border)',marginLeft:6}}>
      {fh.anchorInspectionDue.map((h, i) => (
        <div key={i} style={{textDecoration:'line-through',color:'var(--text-faint)',paddingLeft:8}}>
          {h.value ? formatDate(h.value) : <em>(empty)</em>}
          <span style={{textDecoration:'none',marginLeft:8,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)'}}>· {h.editedBy} · {formatTime(h.editedAt)}</span>
        </div>
      ))}
    </div>
  )}
  <div style={s.infoLinksRow}>
    <div style={{position:'relative',display:'inline-block'}}>
      {channel.whatsapp
        ? <a href={channel.whatsapp} target="_blank" rel="noreferrer" style={{...s.infoLinkBtn, background:'var(--success-bg)', color:'var(--success)', borderColor:'var(--success)'}}>💬 Join chat group</a>
        : (canEdit
            ? <button onClick={handleSetChat} style={{...s.infoLinkBtn, background:'var(--bg-raised)', color:'var(--text-dim)', border:'1px dashed var(--border-strong)', cursor:'pointer'}}>💬 Add chat group</button>
            : null)
      }
      {canEdit && (
        <button onClick={handleSetChat} title={channel.whatsapp ? 'Change chat group link' : 'Add chat group link'} style={{position:'absolute',top:-7,right:-7,width:20,height:20,borderRadius:'50%',background:'var(--success)',color:'#fff',border:'2px solid var(--bg)',cursor:'pointer',fontSize:14,lineHeight:1,padding:0,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
      )}
    </div>
    <span title="This feature is coming soon" style={{...s.infoLinkBtn, background:'var(--bg-raised)', color:'var(--text-faint)', borderColor:'var(--border)', cursor:'default'}}>🔍 Quick Survey · Coming soon</span>
  </div>
  {(channel.editHistory || []).length > 0 && (
    <div style={{marginTop:18,padding:'10px 12px',background:'var(--bg-sunken)',borderRadius:7,border:'1px solid var(--border)'}}>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:0.14,marginBottom:6}}>Audit log</div>
      {channel.createdBy && (
        <div style={{fontSize:11,color:'var(--text-muted)',display:'flex',justifyContent:'space-between',gap:8,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
          <span>📝 Created by <b>{channel.createdBy}</b></span>

        </div>
      )}

        <div key={i} style={{fontSize:11,color:'var(--text-muted)',display:'flex',justifyContent:'space-between',gap:8,padding:'4px 0',borderBottom: i < channel.editHistory.length-1 ? '1px solid var(--border)' : 'none'}}>
          <span>✎ Edited by <b>{h.editedBy}</b> · changed: <span style={{color:'var(--accent-text)'}}>{(h.fields||[]).join(', ')}</span></span>
          <span style={{fontFamily:"'JetBrains Mono',monospace"}}>{formatTime(h.editedAt)}</span>
        </div>
      ))}
    </div>
  )}
</div>);

        <div style={s.incidentSectionLabel}>{label}</div>
        <div style={s.incidentSectionText}>{renderWithMentions(value, allChannels, onMentionClick)}</div>
      </div>
    );
  }
  return (
    <div style={s.incidentSection}>
      <div style={{...s.incidentSectionLabel,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>{label}</span>
        <span style={{fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--warn)',background:'var(--warn-bg)',padding:'2px 6px',borderRadius:3,border:'1px solid var(--warn)',textTransform:'uppercase',letterSpacing:0.2}}>{hist.length} edit{hist.length===1?'':'s'}</span>
      </div>
      <div style={{...s.incidentSectionText,padding:'8px 10px',background:'var(--bg-raised)',borderRadius:6,border:'1px solid var(--border)'}}>
        {hist.map((h, i) => (
          <div key={i} style={{textDecoration:'line-through',color:'var(--text-faint)',marginBottom:4}}>
            {h.value || <em>(empty)</em>}
            <span style={{textDecoration:'none',marginLeft:8,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)'}}>· {h.editedBy} · {formatTime(h.editedAt)}</span>
          </div>
        ))}
        <div>
          {renderWithMentions(value, allChannels, onMentionClick)}
          <span style={{marginLeft:8,fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--success)',textTransform:'uppercase',letterSpacing:0.2}}>· current</span>
        </div>
      </div>
    </div>
  );
};
return (<div style={s.incidentCard}>
  <div style={s.incidentHead}>
    <span style={{...s.incidentBadge, color:t.color, background:t.bg, borderColor:t.color}}>{t.emoji} {t.label}</span>
    <span style={s.incidentDate}>{formatDate(incident.date)}</span>
    {showJob && incident.projectName && (<span style={s.incidentJob}>📋 {incident.projectName}</span>)}
    {(onEdit || onDelete) && (
      <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
        {onEdit && canEdit && <button onClick={(e)=>{e.stopPropagation();onEdit(incident);}} style={{background:'var(--bg-raised)',border:'1px solid var(--border)',borderRadius:5,padding:'3px 10px',fontSize:10,fontWeight:600,color:'var(--text-muted)',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',letterSpacing:0.2}}>✎ Edit</button>}
        {onDelete && canEdit && <button onClick={(e)=>{e.stopPropagation();onDelete(incident.id);}} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:14,padding:0}}>×</button>}
      </div>
    )}
  </div>
  {renderTextField('Technicians', incident.technicians, 'technicians')}
  {renderTextField('What happened', incident.whatHappened, 'whatHappened')}
  {renderTextField('How to avoid', incident.howToAvoid, 'howToAvoid')}
  {(incident.editHistory || []).length > 0 && (
    <div style={{marginTop:10,padding:'8px 10px',background:'var(--bg-sunken)',borderRadius:6,border:'1px solid var(--border)'}}>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:0.14,marginBottom:4}}>Audit log</div>
      <div style={{fontSize:11,color:'var(--text-muted)',display:'flex',justifyContent:'space-between',gap:8,padding:'2px 0',borderBottom:incident.editHistory.length>0?'1px solid var(--border)':'none'}}>
        <span>📝 Reported by <b>{incident.createdBy || '—'}</b></span>
        <span style={{fontFamily:"'JetBrains Mono',monospace"}}>{formatTime(incident.createdAt)}</span>
      </div>
      {incident.editHistory.map((h, i) => (
        <div key={i} style={{fontSize:11,color:'var(--text-muted)',display:'flex',justifyContent:'space-between',gap:8,padding:'2px 0',borderBottom:i<incident.editHistory.length-1?'1px solid var(--border)':'none'}}>
          <span>✎ Edited by <b>{h.editedBy}</b> · changed: <span style={{color:'var(--accent-text)'}}>{(h.fields||[]).join(', ')}</span></span>
          <span style={{fontFamily:"'JetBrains Mono',monospace"}}>{formatTime(h.editedAt)}</span>
        </div>
      ))}
    </div>
  )}
  {(incident.editHistory || []).length === 0 && <div style={{...s.incidentDate, marginTop:10, opacity:0.6}}>Reported {formatTime(incident.createdAt)}{incident.createdBy && ` by ${incident.createdBy}`}</div>}
</div>);
}

function MaterialsView({channel, onUpdate, onAdd}) {
const stored = channel.materials || [];
const items = stored.slice().sort((a,b)=> (a.name||'').localeCompare((b.name||''), undefined, {sensitivity:'base'}));
const [editingId, setEditingId] = useState(null);
const [draftName, setDraftName] = useState('');
const [draftQty, setDraftQty] = useState('');
const [flashId, setFlashId] = useState(null);
const prevIds = useRef(stored.map(m => m.id));
useEffect(() => {
  const now = stored.map(m => m.id);
  const added = now.find(id => !prevIds.current.includes(id));
  prevIds.current = now;
  if (added) { setFlashId(added); const t = setTimeout(() => setFlashId(null), 3000); return () => clearTimeout(t); }
}, [stored.length]);
const toggle = (id) => onUpdate(stored.map(m => m.id === id ? {...m, done:!m.done} : m));
const remove = (id) => { if(confirm('Remove this item?')) onUpdate(stored.filter(m => m.id !== id)); };
const startEdit = (m) => { setEditingId(m.id); setDraftName(m.name||''); setDraftQty(m.qty||''); };
const cancelEdit = () => { setEditingId(null); setDraftName(''); setDraftQty(''); };
const saveEdit = (id) => { const name = draftName.trim(); if(!name){ cancelEdit(); return; } onUpdate(stored.map(m => m.id === id ? {...m, name, qty: draftQty.trim()} : m)); cancelEdit(); };
return (
  <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:0.14,marginBottom:2}}>{items.filter(m=>m.done).length} of {items.length} ready</div>
        <div style={{fontSize:13,color:'var(--text-dim)'}}>Tick items as you load them · tap a name to rename.</div>
      </div>
      <button style={s.primaryBtn} onClick={onAdd}>+ Add item</button>
    </div>
    <div style={{flex:1,overflowY:'auto'}}>
      {items.length === 0 ? <div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>🧰</span><span style={s.emptyText}>No items yet</span></div> : items.map(m => (
        <div key={m.id} style={{...s.matRow, ...(flashId===m.id ? {background:'var(--success-bg)', borderColor:'var(--success)', transition:'background 0.6s ease, border-color 0.6s ease'} : {transition:'background 0.6s ease, border-color 0.6s ease'})}}>
          {editingId === m.id ? (
            <>
              <input autoFocus style={{...s.input,marginBottom:0,flex:1}} value={draftName} onChange={e=>setDraftName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveEdit(m.id);if(e.key==='Escape')cancelEdit();}} placeholder="Item name"/>
              <input style={{...s.input,marginBottom:0,width:80}} value={draftQty} onChange={e=>setDraftQty(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveEdit(m.id);if(e.key==='Escape')cancelEdit();}} placeholder="Qty"/>
              <button onClick={()=>saveEdit(m.id)} style={{...s.badge,...s.badgeSuccess,cursor:'pointer',border:'1px solid var(--success)'}}>Save</button>
              <button onClick={cancelEdit} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:12,padding:0}}>Cancel</button>
            </>
          ) : (
            <>
              <input type="checkbox" style={s.matCheck} checked={m.done} onChange={()=>toggle(m.id)}/>
              <span style={{...s.matName, ...(m.done?s.matNameDone:{}), cursor:'pointer'}} onClick={()=>startEdit(m)} title="Tap to rename">{m.name}</span>
              {m.qty && <span style={s.matQty}>{m.qty}</span>}
              <button onClick={()=>startEdit(m)} title="Edit" style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:13,padding:'0 2px'}}>✎</button>
              <button onClick={()=>remove(m.id)} title="Remove" style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:14,padding:0}}>×</button>
            </>
          )}
        </div>
      ))}
    </div>
  </div>
);
}

function CalendarView({entries, jobChannels, allChannels, getCategory, onNewBooking, onEditBooking, onDeleteBooking, onJumpToProject, onMentionClick, currentUser, company}) {
const roleRings = getRoleRingColors(company);
const ringFor = (n) => { const r = getRoleForName(n, company); return r ? roleRings[r] : null; };
const [cursor, setCursor] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
const [selectedEntryId, setSelectedEntryId] = useState(null);
const [selectedDayMerge, setSelectedDayMerge] = useState(null);
const year = cursor.getFullYear(); const month = cursor.getMonth();
const canBook = currentUser?.role === 'manager' || currentUser?.role === 'team_leader';
const monthLabel = cursor.toLocaleDateString('en-NZ', {month:'long', year:'numeric'});
const firstDay = new Date(year, month, 1);
const startOffset = firstDay.getDay();
const daysInMonth = new Date(year, month+1, 0).getDate();
const daysInPrev = new Date(year, month, 0).getDate();
const today = todayISO();

const cells = [];
for(let i = 0; i < startOffset; i++) { const day = daysInPrev - startOffset + 1 + i; cells.push({day, other:true, date: localISO(new Date(year, month-1, day))}); }
for(let i = 1; i <= daysInMonth; i++) cells.push({day:i, other:false, date: localISO(new Date(year, month, i))});
while(cells.length % 7 !== 0) { const day = cells.length - daysInMonth - startOffset + 1; cells.push({day, other:true, date: localISO(new Date(year, month+1, day))}); }

// Merge entries: same project on same day = grouped together
const mergedByDate = {};
entries.forEach(e => {
  (e.dates || []).forEach(d => {
    if (!mergedByDate[d]) mergedByDate[d] = [];
    let group = mergedByDate[d].find(g => g.projectId === e.projectId);
    if (!group) {
      group = {projectId: e.projectId, projectName: e.projectName, colorId: e.colorId, entries: [], allTechs: new Set()};
      mergedByDate[d].push(group);
    }
    group.entries.push(e);
    const techs = (e.technicians || '').split(',').map(t => t.trim()).filter(Boolean);
    techs.forEach(t => group.allTechs.add(t));
  });
});
Object.keys(mergedByDate).forEach(d => {
  mergedByDate[d].forEach(g => { g.allTechs = [...g.allTechs]; });
});

// Conflict detection: tech in 2+ different projects same day
const conflictsByDate = {};
Object.keys(mergedByDate).forEach(d => {
  const techCounts = {};
  mergedByDate[d].forEach(g => {
    g.allTechs.forEach(t => {
      if (!techCounts[t]) techCounts[t] = [];
      techCounts[t].push(g.projectName);
    });
  });
  const conflicts = {};
  Object.keys(techCounts).forEach(t => {
    if (techCounts[t].length > 1) conflicts[t] = techCounts[t];
  });
  if (Object.keys(conflicts).length > 0) conflictsByDate[d] = conflicts;
});

const runningWithColor = jobChannels.filter(p => p.status !== 'done').slice(0, 12);
const selectedEntry = selectedEntryId ? entries.find(e => e.id === selectedEntryId) : null;
const selectedProject = selectedEntry ? jobChannels.find(p => p.id === selectedEntry.projectId) : null;

const totalConflictDays = Object.keys(conflictsByDate).filter(d => {
  const date = new Date(d + 'T00:00:00');
  return date.getMonth() === month && date.getFullYear() === year;
}).length;

return (<div>
  <div style={s.calNav}>
    <button style={s.calNavBtn} onClick={() => setCursor(new Date(year, month-1, 1))}>‹</button>
    <div style={s.calMonth}>{monthLabel}</div>
    <button style={s.calNavBtn} onClick={() => setCursor(new Date(year, month+1, 1))}>›</button>
  </div>
  {totalConflictDays > 0 && (
    <div style={{padding:'10px 14px',background:'var(--danger-bg)',border:'1px solid var(--danger)',borderRadius:8,marginBottom:12,display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--danger)'}}>
      <span style={{fontSize:16}}>⚠</span>
      <span><b>{totalConflictDays} day{totalConflictDays===1?'':'s'} with double-booked technicians</b> — look for the red triangles on pins.</span>
    </div>
  )}
  {runningWithColor.length > 0 && (
    <div style={s.legend}>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:0.14,marginRight:4}}>Projects:</span>
      {runningWithColor.map(p => { const c = getColor(p.colorId); return (<span key={p.id} style={s.legendItem} onClick={()=>onJumpToProject(p.id)} role="button"><span style={{...s.legendDot, background:c.bar}}/>{p.name}</span>); })}
    </div>
  )}
  <div style={{...s.legend, marginBottom:12}}>
    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:0.14,marginRight:4}}>Rings:</span>
    <span style={{...s.legendItem, cursor:'default'}}>
      <span style={{width:11,height:11,borderRadius:'50%',background:'var(--bg-raised)',boxShadow:'0 0 0 2px #f59e0b',display:'inline-block',flexShrink:0}}/>
      You
    </span>
    {[
      {label:'Manager', color:roleRings.manager},
      {label:'Team leader', color:roleRings.team_leader},
      {label:'Crew', color:roleRings.crew},
    ].map(r => (
      <span key={r.label} style={{...s.legendItem, cursor:'default'}}>
        <span style={{width:11,height:11,borderRadius:'50%',background:'var(--bg-raised)',boxShadow:'0 0 0 2px '+r.color,display:'inline-block',flexShrink:0}}/>
        {r.label}
      </span>
    ))}
    <span style={{...s.legendItem, cursor:'default'}}>
      <span style={{width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderBottom:'9px solid #dc2626',display:'inline-block',flexShrink:0,filter:'drop-shadow(0 0 1px #fff)'}}/>
      Double-booked
    </span>
  </div>
  <div style={{...s.calGrid, gridTemplateColumns:'repeat(7,minmax(0,1fr))'}}>
    {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} style={s.calHeadCell}>{d}</div>)}
    {cells.map((c, i) => {
      const dayGroups = mergedByDate[c.date] || [];
      const dayConflicts = conflictsByDate[c.date] || {};
      const hasConflicts = Object.keys(dayConflicts).length > 0;
      return (
        <div key={i} style={{
          ...s.calCell,
          minHeight:120,
          ...(c.date === today ? s.calCellToday : {}),
          ...(c.other ? s.calCellOther : {}),
          ...(hasConflicts && !c.other ? {borderColor:'var(--danger)', borderWidth:2} : {})
        }} onClick={() => { if(!c.other && canBook) onNewBooking(c.date); }}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}}>
            <div style={s.calDay}>{c.day}</div>
            {hasConflicts && (
              <span title={'Conflicts: ' + Object.keys(dayConflicts).map(n => n + ' in ' + dayConflicts[n].join(' + ')).join(' · ')} style={{fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'#fff',background:'var(--danger)',padding:'1px 5px',borderRadius:3,letterSpacing:0.2}}>⚠ {Object.keys(dayConflicts).length}</span>
            )}
          </div>
          {dayGroups.length > 0 && (
            <div style={{display:'flex',flexDirection:'column',gap:3,flex:1,minHeight:0}}>
              {dayGroups.slice(0, 3).map((g, gi) => {
                const col = getColor(g.colorId);
                const isMerged = g.entries.length > 1;
                return (
                  <div key={gi} style={{
                    background:col.bar,
                    color:'#fff',
                    borderRadius:4,
                    padding:'4px 6px',
                    cursor:'pointer',
                    display:'flex',
                    flexDirection:'column',
                    gap:3,
                    overflow:'hidden',
                    border: isMerged ? '1px dashed rgba(255,255,255,0.5)' : 'none',
                  }} title={g.projectName + (isMerged ? (' (' + g.entries.length + ' bookings merged)') : '')} onClick={(ev) => {
                    ev.stopPropagation();
                    if (isMerged) setSelectedDayMerge({date: c.date, projectId: g.projectId, projectName: g.projectName, entries: g.entries});
                    else setSelectedEntryId(g.entries[0].id);
                  }}>
                    <div style={{fontSize:10,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:3}}>
                      <span>◆</span><span>{g.projectName}</span>
                      {isMerged && <span style={{fontSize:8,opacity:0.85,fontFamily:"'JetBrains Mono',monospace",marginLeft:'auto'}}>×{g.entries.length}</span>}
                    </div>
                    {g.allTechs.length > 0 && (
                      <div style={{display:'flex',gap:2,flexWrap:'wrap',alignItems:'center'}}>
                        {g.allTechs.slice(0, 6).map((n,j) => {
                          const conflict = dayConflicts[n] ? dayConflicts[n].filter(p => p !== g.projectName).join(' + ') : null;
                          return <InitialsPin key={j} name={n} projectColor={col.bar} size={18} doubleBooked={!!conflict} isMe={currentUser?.name === n} roleColor={ringFor(n)} title={conflict ? n + ' ⚠ also in: ' + conflict : (currentUser?.name === n ? n + ' (you)' : n)}/>;
                        })}
                        {g.allTechs.length > 6 && <span style={{fontSize:9,fontWeight:600,opacity:0.85,marginLeft:2}}>+{g.allTechs.length-6}</span>}
                      </div>
                    )}
                  </div>
                );
              })}
              {dayGroups.length > 3 && (
                <div style={{...s.calBar, background:'var(--bg-sunken)', color:'var(--text-dim)'}}>+{dayGroups.length-3} more</div>
              )}
            </div>
          )}
        </div>
      );
    })}
  </div>
  {selectedDayMerge && (() => {
    const dayConflicts = conflictsByDate[selectedDayMerge.date] || {};
    const proj = jobChannels.find(p => p.id === selectedDayMerge.projectId);
    const projColor = proj ? getColor(proj.colorId) : null;
    return (
      <div style={s.entryDetail}>
        <div style={s.entryHead}>
          {projColor && <div style={{...s.entryColorBar, background:projColor.bar}}/>}
          <div style={{flex:1, minWidth:0}}>
            <div style={s.entryProjectName} onClick={()=>onJumpToProject(selectedDayMerge.projectId)}>◆ {selectedDayMerge.projectName}</div>
            <div style={{fontSize:12,color:'var(--text-dim)',marginTop:3}}>{selectedDayMerge.entries.length} overlapping bookings on {formatDate(selectedDayMerge.date)}</div>
          </div>
        </div>
        {selectedDayMerge.entries.map((e, ei) => {
          const techNames = (e.technicians || '').split(',').map(t => t.trim()).filter(Boolean);
          return (
            <div key={e.id} style={{padding:'12px 14px',background:'var(--bg-raised)',borderRadius:7,border:'1px solid var(--border)',marginTop:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
                <span style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--accent-text)',background:'var(--accent-bg)',padding:'3px 8px',borderRadius:4,border:'1px solid var(--accent)'}}>BOOKING #{ei+1}</span>
                <span style={{fontSize:11,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace"}}>{e.days > 1 ? (formatShortDate(e.startDate) + ' → ' + formatShortDate(addDays(e.startDate, e.days-1)) + ' · ' + e.days + ' days') : (formatShortDate(e.startDate) + ' · 1 day')}</span>
              </div>
              {techNames.length > 0 && (
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:6}}>
                  {techNames.map((n,j) => {
                    const conflict = dayConflicts[n] ? dayConflicts[n].filter(p => p !== selectedDayMerge.projectName).join(' + ') : null;
                    return (
                      <span key={j} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 8px 3px 3px',background:'var(--bg-panel)',borderRadius:14,border:'1px solid var(--border)'}}>
                        <InitialsPin name={n} projectColor={projColor && projColor.bar} size={18} doubleBooked={!!conflict} isMe={currentUser?.name === n} roleColor={ringFor(n)} title={conflict ? n + ' ⚠ also in: ' + conflict : (currentUser?.name === n ? n + ' (you)' : n)}/>
                        <span style={{fontSize:11,color:'var(--text)'}}>{n}</span>
                      </span>
                    );
                  })}
                </div>
              )}

function ToolboxFormModal({onClose, onSave, project, company, currentUser, editing, calendarEntries}) {
const [date, setDate] = useState(editing?.date || todayISO());
// Get technicians: those scheduled today + those from this project ever + company users (fallback)
const techSuggestions = useMemo(() => {
  const {sameDay, allProject} = getSuggestedTechniciansForDate(project.id, date, calendarEntries || []);
  const companyUserNames = (company?.users || []).map(u => u.name);
  // Build suggestion order: today's scheduled (highlighted) + project-wide + rest of company
  const allUnique = new Set([...sameDay, ...allProject]);
  return {
    sameDay,
    allProject: [...allUnique],
    company: companyUserNames.filter(n => !allUnique.has(n)),
  };
}, [project.id, date, calendarEntries, company]);
const allKnownNames = useMemo(() => {
  const s = new Set([...techSuggestions.allProject, ...techSuggestions.company]);
  return [...s];
}, [techSuggestions]);
const [attendees, setAttendees] = useState(editing?.attendees || (currentUser ? [currentUser.name] : (techSuggestions.sameDay.length > 0 ? techSuggestions.sameDay : [])));
const [outsiders, setOutsiders] = useState(editing?.outsiders || []); // [{name, description}]
const [showAddOther, setShowAddOther] = useState(false);
const [otherName, setOtherName] = useState('');
const [otherDescription, setOtherDescription] = useState('');
const [todaysWork, setTodaysWork] = useState(editing?.todaysWork || '');
const [hazards, setHazards] = useState(editing?.hazards || [{hazard:'',control:''}]);
const [signers, setSigners] = useState(editing?.signers || [{name:currentUser?.name || '', signed: false, initials:''}]);

const toggleAttendee = (name) => setAttendees(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
const addOutsider = () => {
  if (!otherName.trim()) return;
  setOutsiders(p => [...p, {name: otherName.trim(), description: otherDescription.trim()}]);
  setAttendees(p => [...p, otherName.trim()]);
  setOtherName(''); setOtherDescription(''); setShowAddOther(false);
};
const removeOutsider = (name) => {
  setOutsiders(p => p.filter(o => o.name !== name));
  setAttendees(p => p.filter(n => n !== name));
};
const addHazard = () => setHazards(p => [...p, {hazard:'',control:''}]);
const removeHazard = (i) => setHazards(p => p.filter((_,j) => j !== i));
const setHz = (i, key, val) => setHazards(p => p.map((h,j) => j===i ? {...h, [key]:val} : h));

const addSigner = () => setSigners(p => [...p, {name:'', signed:false, initials:''}]);
const removeSigner = (i) => setSigners(p => p.filter((_,j) => j !== i));
const setSgn = (i, key, val) => setSigners(p => p.map((sg,j) => j===i ? {...sg, [key]:val} : sg));
const allSigned = signers.length > 0 && signers.every(sg => sg.signed && sg.initials.trim() && sg.name.trim());

const save = () => {
  if (attendees.length === 0) return alert('Pick at least one attendee.');
  if (!todaysWork.trim()) return alert('Describe today\'s work.');
  if (!allSigned) return alert('All signers must add their initials and tick "Sign off".');
  const trimmedHazards = hazards.filter(h => h.hazard.trim() || h.control.trim());
  const newToolbox = {
    id: editing?.id || ('tb-'+Date.now().toString(36)),
    projectId: project.id,
    projectName: project.name,
    projectAddress: project.address,
    teamLeader: project.teamLeader,
    date,
    attendees,
    outsiders,
    todaysWork: todaysWork.trim(),
    hazards: trimmedHazards,
    signers,
    author: editing?.author || currentUser?.name || '—',
    createdAt: editing?.createdAt || new Date().toISOString(),
    editHistory: editing?.editHistory || [],
    fieldHistory: editing?.fieldHistory || {},
  };
  if (editing) {
    const userName = currentUser?.name || '—';
    // Track simple text fields
    const textHist = diffSimpleFields(editing, {date, todaysWork: todaysWork.trim()}, ['date','todaysWork'], userName);
    // Track array fields
    const arrHist = diffArrayFields(editing, {attendees, hazards: trimmedHazards, signers}, ['attendees','hazards','signers'], userName);
    newToolbox.fieldHistory = mergeFieldHistory(editing.fieldHistory, textHist, arrHist);
    // Top-level summary edit history
    const changes = [];
    if (editing.date !== date) changes.push('date');
    if (JSON.stringify(editing.attendees||[]) !== JSON.stringify(attendees)) changes.push('attendees');
    if ((editing.todaysWork||'') !== todaysWork.trim()) changes.push("today's work");
    if (JSON.stringify(editing.hazards||[]) !== JSON.stringify(trimmedHazards)) changes.push('hazards');
    if (JSON.stringify(editing.signers||[]) !== JSON.stringify(signers)) changes.push('sign off');
    if (changes.length > 0) {
      newToolbox.editHistory = [...(editing.editHistory || []), {
        editedAt: new Date().toISOString(),
        editedBy: userName,
        fields: changes,
      }];
    }
  }
  onSave(newToolbox);
  onClose();
};

// ── FIELD HISTORY HELPERS ────────────────────────────────────────────────
// Tracks changes per field so we can show audit trail with strikethrough
// Structure: fieldHistory = { fieldName: [{value, editedAt, editedBy}, ...] }
// The current value is whatever's in the main object; fieldHistory holds previous values.

function diffSimpleFields(prev, next, fields, currentUserName) {
  // Returns a fieldHistory object with new entries for changed simple text fields
  const now = new Date().toISOString();
  const history = {...(prev.fieldHistory || {})};
  fields.forEach(f => {
    const oldVal = (prev[f] || '');
    const newVal = (next[f] || '');
    if (String(oldVal).trim() !== String(newVal).trim()) {
      const arr = history[f] || [];
      // Push the OLD value into history (the new one is current)
      arr.push({value: oldVal, editedAt: now, editedBy: currentUserName, replacedAt: now});
      history[f] = arr;
    }
  });
  return history;
}

function diffArrayFields(prev, next, fields, currentUserName) {
  // For array fields (e.g. attendees, hazards). Compares JSON.
  const now = new Date().toISOString();
  const history = {};
  fields.forEach(f => {
    const oldArr = prev[f] || [];
    const newArr = next[f] || [];
    if (JSON.stringify(oldArr) !== JSON.stringify(newArr)) {
      const existing = (prev.fieldHistory && prev.fieldHistory[f]) || [];
      history[f] = [...existing, {value: oldArr, editedAt: now, editedBy: currentUserName}];
    } else if (prev.fieldHistory && prev.fieldHistory[f]) {
      history[f] = prev.fieldHistory[f];
    }
  });
  return history;
}

function mergeFieldHistory(...objects) {
  // Merge multiple fieldHistory objects (preserves all entries)
  const out = {};
  objects.forEach(o => {
    if (!o) return;
    Object.keys(o).forEach(k => {
      if (!out[k]) out[k] = o[k];
      else if (o[k].length > out[k].length) out[k] = o[k]; // longer = more recent
    });
  });
  return out;
}

// ── DISPLAY COMPONENTS WITH HISTORY ──────────────────────────────────────
function FieldWithHistory({label, value, history, emoji, multiline}) {
  const hist = history || [];
  if (hist.length === 0) {
    // No history - display as normal
    if (multiline) {
      return value ? <div style={{padding:'10px 12px',background:'var(--bg-raised)',borderRadius:7,fontSize:13,color:'var(--text)',lineHeight:1.55,whiteSpace:'pre-wrap',border:'1px solid var(--border)'}}>{value}</div> : null;
    }
    return (
      <div style={{display:'flex',gap:6,alignItems:'baseline',marginBottom:4}}>
        {emoji && <span>{emoji}</span>}
        {label && <span style={{fontWeight:700,color:'var(--text)',fontSize:13}}>{label}:</span>}
        <span style={{color:'var(--text-muted)',fontSize:13}}>{value || '—'}</span>
      </div>
    );
  }
  // Has history. Was the field REMOVED (current empty, but had value)?
  const isRemoved = (!value || !String(value).trim()) && hist.some(h => h.value && String(h.value).trim());
  const wasEmpty = (v) => !v || !String(v).trim();
  return (
    <div style={{marginBottom:multiline?8:4}}>
      {label && (
        <div style={{display:'flex',gap:6,alignItems:'baseline',marginBottom:multiline?6:2}}>
          {emoji && <span>{emoji}</span>}
          <span style={{fontWeight:700,color:'var(--text)',fontSize:13}}>{label}:</span>
          <span style={{fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--warn)',background:'var(--warn-bg)',padding:'2px 6px',borderRadius:3,border:'1px solid var(--warn)',textTransform:'uppercase',letterSpacing:0.2,marginLeft:'auto'}}>{hist.length} edit{hist.length===1?'':'s'}</span>
        </div>
      )}
      <div style={{padding:multiline?'10px 12px':'6px 10px',background:'var(--bg-raised)',borderRadius:7,border:'1px solid var(--border)',fontSize:13,lineHeight:1.55}}>
        {hist.map((h, i) => {
          // Determine: was this version REMOVED (next version is empty) or UPDATED?
          const nextVal = i < hist.length - 1 ? hist[i+1].value : value;
          const wasReplacedByEmpty = wasEmpty(nextVal);
          return (
            <div key={i} style={{
              color: wasReplacedByEmpty ? 'var(--text-faint)' : 'var(--text-muted)',
              textDecoration: wasReplacedByEmpty ? 'line-through' : 'none',
              whiteSpace: multiline ? 'pre-wrap' : 'normal',
              marginBottom: 4,
              opacity: 0.85,
            }}>
              {h.value || <em>(empty)</em>}
              <span style={{textDecoration:'none',marginLeft:8,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)'}}>
                {wasReplacedByEmpty ? '✕ removed' : '↳ updated'} by {h.editedBy} · {formatTime(h.editedAt)}
              </span>
            </div>
          );
        })}
        {isRemoved ? (
          <div style={{fontSize:11,color:'var(--text-faint)',fontStyle:'italic'}}>(field cleared)</div>
        ) : (
          <div style={{color:'var(--text)',whiteSpace:multiline?'pre-wrap':'normal',fontWeight:multiline?'normal':500}}>
            {value || <em style={{color:'var(--text-faint)'}}>(empty)</em>}
            <span style={{marginLeft:8,fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--success)',textTransform:'uppercase',letterSpacing:0.2}}>· current</span>
          </div>
        )}
      </div>
    </div>
  );
}

function ListWithHistory({label, items, history, renderItem, itemKey}) {
  // history is an array of {value: previousList, editedAt, editedBy}
  // We compute per-item diffs across all versions
  const hist = history || [];
  const keyOf = itemKey || ((it) => typeof it === 'string' ? it : JSON.stringify(it));
  const currentItems = items || [];

  // Build full picture: for each unique item, when it was added and (if applicable) removed
  // Strategy: walk versions chronologically: hist[0] = oldest, hist[hist.length-1] = newest before current
  // versions = [oldest, ..., previous-to-current]; current = items
  const versions = hist.map(h => h.value || []);
  const meta = hist.map(h => ({editedAt: h.editedAt, editedBy: h.editedBy}));
  const allVersions = [...versions, currentItems]; // last = current
  const allMeta = [...meta, null]; // null = current state

  // Step 1: collect all unique items ever seen (by key) and find their lifecycle
  const lifecycle = new Map(); // key -> {item, addedAt, addedBy, removedAt, removedBy, presentInCurrent}
  allVersions.forEach((version, vIdx) => {
    const versionKeys = new Set();
    (version || []).forEach((it) => {
      const k = keyOf(it);
      versionKeys.add(k);
      if (!lifecycle.has(k)) {
        const m = vIdx === 0 ? null : allMeta[vIdx];
        lifecycle.set(k, {
          item: it,
          addedAt: m?.editedAt,
          addedBy: m?.editedBy,
          inFirstVersion: vIdx === 0,
          presentInCurrent: vIdx === allVersions.length - 1,
          removedAt: null,
          removedBy: null,
        });
      } else {
        // Update item ref to latest version of this item
        lifecycle.get(k).item = it;
        if (vIdx === allVersions.length - 1) lifecycle.get(k).presentInCurrent = true;
      }
    });
    // Items that were in the previous version but not this one → removed at this point
    if (vIdx > 0) {
      const prevVersion = allVersions[vIdx - 1];
      (prevVersion || []).forEach((it) => {
        const k = keyOf(it);
        if (!versionKeys.has(k) && lifecycle.has(k) && !lifecycle.get(k).removedAt) {
          // Was present in previous version, gone now
          const m = allMeta[vIdx];
          if (m) {
            lifecycle.get(k).removedAt = m.editedAt;
            lifecycle.get(k).removedBy = m.editedBy;
          }
        }
      });
    }
  });
  // Mark items present in current (in case they were re-added)
  const currentKeys = new Set(currentItems.map(it => keyOf(it)));
  lifecycle.forEach((lc, k) => {
    lc.presentInCurrent = currentKeys.has(k);
    if (lc.presentInCurrent) {
      // Reset removed marker if item is back
      lc.removedAt = null;
      lc.removedBy = null;
    }
  });

  const ordered = [...lifecycle.values()];
  // Sort: present items first (in current order), then removed items
  const orderedCurrent = currentItems.map(it => {
    const k = keyOf(it);
    return lifecycle.get(k);
  }).filter(Boolean);
  const orderedRemoved = ordered.filter(lc => !lc.presentInCurrent);
  const finalList = [...orderedCurrent, ...orderedRemoved];

  return (
    <div style={{marginBottom:8}}>
      {label && (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{...s.modalKicker}}>{label}</span>
          {hist.length > 0 && <span style={{fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--warn)',background:'var(--warn-bg)',padding:'2px 6px',borderRadius:3,border:'1px solid var(--warn)',textTransform:'uppercase',letterSpacing:0.2}}>{hist.length} edit{hist.length===1?'':'s'}</span>}
        </div>
      )}
      {finalList.length === 0 && <div style={{padding:'8px 10px',background:'var(--bg-raised)',borderRadius:6,fontSize:12,color:'var(--text-faint)',fontStyle:'italic',border:'1px solid var(--border)'}}>(empty)</div>}
      {finalList.map((lc, i) => {
